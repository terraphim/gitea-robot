name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          VERSION=${GITHUB_REF_NAME:-dev}
          EXT=""
          if [ "${{ matrix.goos }}" = "windows" ]; then EXT=".exe"; fi
          go build -ldflags "-s -w -X main.version=${VERSION}" \
            -o gitea-robot-${{ matrix.goos }}-${{ matrix.goarch }}${EXT} ./cmd/gitea-robot/

      - name: Upload to Gitea release
        env:
          GITEA_TOKEN: ${{ secrets.GITEA_TOKEN }}
        run: |
          set -e
          TAG=${GITHUB_REF_NAME}
          EXT=""
          if [ "${{ matrix.goos }}" = "windows" ]; then EXT=".exe"; fi
          FILE=gitea-robot-${{ matrix.goos }}-${{ matrix.goarch }}${EXT}
          curl -s -X POST \
            -H "Authorization: token ${GITEA_TOKEN}" \
            -F "attachment=@${FILE}" \
            "https://git.terraphim.cloud/api/v1/repos/terraphim/gitea-robot/releases/tags/${TAG}/assets?name=${FILE}"
